<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ლიტერატურის ისტორია — Deep Space Academy</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#64b5ff">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav>
    <div class="nav-container">
      <div class="logo" onclick="window.location.href='index.html'">🌌 Deep Space Academy</div>
      <div class="hamburger" onclick="toggleMobileMenu()">☰</div>
      <div class="nav-links" id="navLinks">
        <a href="index.html">მთავარი</a>
        <a href="books.html">წიგნები</a>
        <a href="history.html" class="active">ლიტერატურის ისტორია</a>
        <a href="dashboard.html">ჩემი დაფა</a>
        <a href="assignments.html">დავალებები</a>
        <a href="#" onclick="logout()">გამოსვლა</a>
      </div>
    </div>
  </nav>

  <div style="max-width: 1200px; margin: 0 auto; padding: 50px 20px;">
    <h1 style="text-align: center; margin-bottom: 60px; font-size: 2.8rem;">
      📜 ქართული ლიტერატურის ისტორია
    </h1>

    <div id="historyContainer"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderHistory() {
      const container = document.getElementById('historyContainer');
      container.innerHTML = '';

      literatureHistory.forEach(item => {
        const card = `
          <div class="glass" style="padding: 35px; margin-bottom: 30px; border-radius: 16px;">
            <h2 style="color: #64b5ff; margin-bottom: 18px;">${item.period}</h2>
            <p style="font-size: 1.1rem; margin-bottom: 20px; color: #ddd;">
              ${item.description}
            </p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 25px;">
              <div>
                <strong>მთავარი ფიგურები:</strong>
                <p style="margin-top: 8px; color: #ccc;">${item.key_figures}</p>
              </div>
              <div>
                <strong>მნიშვნელოვანი ნაწარმოებები:</strong>
                <p style="margin-top: 8px; color: #ccc;">${item.works}</p>
              </div>
            </div>
          </div>`;
        container.innerHTML += card;
      });
    }

    // გვერდის ჩატვირთვა
    window.onload = renderHistory;
  </script>
</body>
</html>
